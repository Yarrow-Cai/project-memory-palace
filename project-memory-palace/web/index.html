<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Memory Palace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== Linear Dark Theme ===== */
:root {
  --bg: #08090a;
  --panel: #0f1011;
  --surface: #191a1b;
  --surface-hover: #1e1f20;
  --text: #f7f8f8;
  --text-secondary: #d0d6e0;
  --text-muted: #8a8f98;
  --text-quiet: #62666d;
  --accent: #7170ff;
  --accent-bg: #5e6ad2;
  --accent-hover: #828fff;
  --accent-fade: rgba(94,106,210,0.12);
  --border: rgba(255,255,255,0.08);
  --border-subtle: rgba(255,255,255,0.05);
  --radius: 8px;
  --radius-sm: 6px;
  --radius-xs: 4px;
  --font: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --green: #27a644;
  --yellow: #eab308;
  --red: #ef4444;
  --grey: #6b7280;
}

/* Light theme overrides */
body.light {
  --bg: #f7f8f8;
  --panel: #ffffff;
  --surface: #f3f4f5;
  --surface-hover: #ebedef;
  --text: #17191c;
  --text-secondary: #4a5058;
  --text-muted: #7b828b;
  --text-quiet: #9ba3ac;
  --border: rgba(0,0,0,0.08);
  --border-subtle: rgba(0,0,0,0.05);
  --accent-fade: rgba(94,106,210,0.08);
}

/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  font-size:14px;
  font-weight:400;
  color:var(--text);
  background:var(--bg);
  display:flex;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ===== Sidebar ===== */
aside{
  width:320px;min-width:320px;
  background:var(--panel);
  border-right:1px solid var(--border-subtle);
  display:flex;flex-direction:column;
  height:100vh;z-index:10;
  transition:background .2s;
}

/* Header */
.sidebar-header{
  padding:20px 20px 14px;
  border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:10px;
}
.sidebar-header .logo{font-size:17px;line-height:1}
.sidebar-header h1{
  font-size:14px;font-weight:600;
  letter-spacing:-0.01em;color:var(--text);
}

/* Toolbar */
.sidebar-toolbar{
  display:flex;gap:6px;
  padding:8px 14px;
  border-bottom:1px solid var(--border-subtle);
}
.sidebar-toolbar button{
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.03);
  color:var(--text-secondary);
  font-size:12px;font-weight:500;font-family:var(--font);
  cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:4px;
}
.sidebar-toolbar button:hover{
  background:rgba(255,255,255,0.06);
  color:var(--text);
  border-color:rgba(255,255,255,0.12);
}
body.light .sidebar-toolbar button{
  background:rgba(0,0,0,0.02);
}
body.light .sidebar-toolbar button:hover{
  background:rgba(0,0,0,0.05);
}

/* Project Bar */
.proj-bar{
  padding:10px 14px;
  border-bottom:1px solid var(--border-subtle);
  display:flex;gap:6px;align-items:center;
}
.proj-bar select{
  flex:1;min-width:0;
  padding:6px 8px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--text);
  font-size:11px;font-weight:500;font-family:var(--font);
  outline:none;cursor:pointer;
  transition:border .15s;
  max-width:100%;
}
.proj-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-fade)}
.proj-bar select option{
  font-family:var(--mono);font-size:11px;
  padding:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.proj-input-wrap{
  flex:1;min-width:0;position:relative;
}
.proj-input-wrap input{
  width:100%;
  padding:6px 8px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--text);
  font-size:11px;font-weight:400;font-family:var(--mono);
  outline:none;transition:border .15s;
}
.proj-input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-fade)}
.proj-input-wrap input::placeholder{color:var(--text-quiet)}
/* Path tooltip */
.proj-input-wrap .path-tooltip{
  position:absolute;bottom:calc(100% + 8px);left:0;
  background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:6px 10px;font-size:11px;font-family:var(--mono);
  white-space:nowrap;pointer-events:none;z-index:100;
  opacity:0;transform:translateY(4px);transition:all .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  word-break:break-all;max-width:400px;
  white-space:normal;
}
.proj-input-wrap:hover .path-tooltip,
.proj-input-wrap input:focus ~ .path-tooltip{opacity:1;transform:translateY(0)}
.proj-btn{
  padding:6px 12px;
  border:1px solid var(--accent-bg);
  border-radius:var(--radius-sm);
  background:var(--accent-bg);
  color:#fff;
  font-size:11px;font-weight:600;font-family:var(--font);
  cursor:pointer;white-space:nowrap;transition:all .12s;
}
.proj-btn:hover{background:var(--accent-hover)}

/* Search */
.search-wrap{
  padding:8px 14px;position:relative;
}
.search-wrap .search-icon{
  position:absolute;left:22px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:13px;pointer-events:none;
}
.search-wrap input{
  width:100%;
  padding:8px 10px 8px 32px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--text);
  font-size:12px;font-weight:400;font-family:var(--font);
  outline:none;transition:border .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-fade)}
.search-wrap input::placeholder{color:var(--text-quiet)}

/* Card List */
.card-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:4px 8px;
  scrollbar-width:thin;
  scrollbar-color:var(--text-quiet) transparent;
}
.card-list::-webkit-scrollbar{width:5px}
.card-list::-webkit-scrollbar-track{background:transparent}
.card-list::-webkit-scrollbar-thumb{background:var(--text-quiet);border-radius:3px}

.card-item{
  padding:10px 12px;
  border-radius:var(--radius-sm);
  cursor:pointer;margin:1px 0;
  transition:background .1s,border-color .1s;
  border:1px solid transparent;
  display:flex;flex-direction:column;gap:3px;
}
.card-item:hover{background:var(--surface-hover)}
.card-item.selected{
  background:var(--accent-fade);
  border-color:rgba(113,112,255,0.2);
}
.card-item .card-top{display:flex;align-items:center;gap:6px;min-width:0}
.card-item .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.active{background:var(--green)}
.status-dot.stale{background:var(--yellow)}
.status-dot.superseded{background:var(--grey)}
.status-dot.rejected{background:var(--red)}
.card-item .type-icon{font-size:12px;flex-shrink:0;color:var(--text-muted)}
.card-item .card-title{
  font-size:12px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.card-item .card-summary{
  font-size:11px;color:var(--text-muted);line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-item .card-meta{
  font-size:10px;color:var(--text-quiet);font-weight:400;
}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;
  color:var(--text-quiet);gap:12px;padding:24px;
}
.empty-state .empty-icon{font-size:28px;opacity:.5}
.empty-state .empty-text{font-size:12px;text-align:center;line-height:1.6;font-weight:400}

/* Status bar */
.status-bar{
  border-top:1px solid var(--border-subtle);
  padding:6px 16px;font-size:10px;font-weight:400;
  color:var(--text-quiet);display:flex;justify-content:space-between;
}

/* ===== Main Detail Panel ===== */
main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:36px 48px;
  background:var(--bg);
  scrollbar-width:thin;
  scrollbar-color:var(--text-quiet) transparent;
}
main::-webkit-scrollbar{width:6px}
main::-webkit-scrollbar-track{background:transparent}
main::-webkit-scrollbar-thumb{background:var(--text-quiet);border-radius:3px}

/* Detail sections */
.detail-header{margin-bottom:28px}
.detail-header h2{
  font-size:22px;font-weight:600;line-height:1.35;
  letter-spacing:-0.01em;color:var(--text);
  word-break:break-word;
}
.detail-meta{
  display:flex;gap:14px;align-items:center;
  margin-top:10px;font-size:12px;font-weight:400;
  color:var(--text-muted);flex-wrap:wrap;
}
.detail-meta .meta-item{display:flex;align-items:center;gap:5px}

/* Confidence bar */
.conf-bar{width:56px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* Badges */
.badge{
  padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;
  letter-spacing:-0.01em;
}
.badge-active{background:rgba(39,166,68,.15);color:var(--green)}
.badge-stale{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge-superseded{background:rgba(107,114,128,.15);color:var(--grey)}
.badge-rejected{background:rgba(239,68,68,.15);color:var(--red)}

body.light .badge-active{background:#dcfce7;color:#166534}
body.light .badge-stale{background:#fef9c3;color:#854d0e}
body.light .badge-superseded{background:#f3f4f6;color:#4b5563}
body.light .badge-rejected{background:#fee2e2;color:#991b1b}

/* Section */
.section{margin-bottom:24px}
.section h3{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-quiet);margin-bottom:8px;
}
.section .section-content{
  font-size:13px;line-height:1.7;font-weight:400;
  padding:14px 16px;
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border-subtle);
  color:var(--text-secondary);
  word-break:break-word;
  font-family:var(--font);
}
.section .section-content:empty{display:none}

/* Tags */
.tags-row{display:flex;gap:5px;flex-wrap:wrap}
.tag{
  padding:2px 10px;border-radius:999px;
  font-size:11px;font-weight:500;
  background:rgba(113,112,255,0.1);
  color:var(--accent);
  border:1px solid rgba(113,112,255,0.15);
}

/* ID monospace */
.id-mono{
  font-family:var(--mono);font-size:11px;font-weight:400;
  color:var(--text-quiet);
  padding:2px 8px;border-radius:var(--radius-xs);
  background:var(--surface);border:1px solid var(--border-subtle);
}

/* Context menu */
.ctx-menu{
  position:fixed;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:4px;min-width:160px;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  z-index:1000;display:none;
}
.ctx-menu .ctx-item{
  padding:7px 12px;font-size:12px;font-weight:400;
  border-radius:var(--radius-xs);cursor:pointer;
  transition:background .1s;color:var(--text);font-family:var(--font);
}
.ctx-menu .ctx-item:hover{background:var(--surface-hover)}
.ctx-menu .ctx-sep{
  height:1px;background:var(--border-subtle);margin:4px 0;
}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);
  padding:8px 20px;border-radius:999px;
  font-size:12px;font-weight:500;font-family:var(--font);
  z-index:2000;opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast.show{opacity:1}

/* Spinner */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Responsive ===== */
@media(max-width:768px){
  body{flex-direction:column}
  aside{width:100%;min-width:auto;height:auto;max-height:42vh}
  main{padding:20px}
  .detail-header h2{font-size:18px}
  .path-tooltip{max-width:280px !important}
}
</style>
</head>
<body class="dark">
<aside>
  <div class="sidebar-header">
    <span class="logo">🏰</span>
    <h1>Project Memory Palace</h1>
  </div>
  <div class="sidebar-toolbar">
    <button onclick="toggleTheme()" title="Toggle theme">🌓</button>
    <button onclick="refreshList()" title="Refresh">↻</button>
  </div>
  <div class="proj-bar">
    <select id="projSelect" onchange="onProjSelect(this.value)">
      <option value="">-- Recent --</option>
    </select>
  </div>
  <div class="proj-bar" style="border-top:none;padding-top:0">
    <div class="proj-input-wrap">
      <input type="text" id="projInput" placeholder="Project path..." onkeydown="if(event.key==='Enter')changeProject()">
      <div class="path-tooltip" id="pathTooltip"></div>
    </div>
    <button class="proj-btn" onclick="changeProject()">Go</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchBox" placeholder="Search memories..." onkeydown="if(event.key==='Enter')doSearch()" oninput="liveSearch()">
  </div>
  <div class="card-list" id="cardList">
    <div class="empty-state"><span class="empty-icon">📭</span><span class="empty-text">No memories found</span></div>
  </div>
  <div class="status-bar">
    <span id="statusText">Ready</span>
    <span id="itemCount"></span>
  </div>
</aside>

<main id="detailPanel">
  <div class="empty-state" style="height:100%">
    <span class="empty-icon">📋</span>
    <span class="empty-text">Select a memory to view details</span>
  </div>
</main>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="copyID()">📋 Copy ID</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="markStatus('active')">✓ Mark active</div>
  <div class="ctx-item" onclick="markStatus('stale')">⚠ Mark stale</div>
  <div class="ctx-item" onclick="markStatus('superseded')">◉ Mark superseded</div>
  <div class="ctx-item" onclick="markStatus('rejected')">✕ Mark rejected</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
var TYPE_ICONS={project_goal:"☆",design:"◎",decision:"⚑",change_reason:"↻",bugfix:"☠",module:"▣",convention:"§",open_question:"⁇"};
var currentID=null,dark=true;

// ===== API Helpers =====
function api(url,opts){return fetch(url,opts).then(r=>r.json())}

// ===== Loading =====
function loadRecent(){
  showStatus('<span class="spinner"></span> Loading...');
  api('/api/recent').then(d=>{
    renderList(d.results||[]);
    showStatus('Ready',(d.results||[]).length+' items');
  }).catch(()=>showStatus('Error loading'));
}

function doSearch(){
  var q=document.getElementById('searchBox').value.trim();
  if(!q)return;
  showStatus('<span class="spinner"></span> Searching...');
  api('/api/search?q='+encodeURIComponent(q)).then(d=>{
    renderList(d.results||[]);
    showStatus('Found '+(d.results||[]).length+' results');
  }).catch(()=>showStatus('Search error'));
}

var searchTimer=null;
function liveSearch(){
  clearTimeout(searchTimer);
  var q=document.getElementById('searchBox').value.trim();
  if(!q){loadRecent();return}
  searchTimer=setTimeout(doSearch,300);
}

function refreshList(){loadRecent()}

// ===== Render Card List =====
function renderList(items){
  var el=document.getElementById('cardList');
  if(!items.length){
    el.innerHTML='<div class="empty-state"><span class="empty-icon">📭</span><span class="empty-text">No memories found</span></div>';
    return;
  }
  el.innerHTML=items.map(function(c){
    var ti=TYPE_ICONS[c.type]||'●',ts=(c.updated_at||'').slice(0,16);
    return '<div class="card-item" onclick="showDetail(\''+c.id+'\')" oncontextmenu="event.preventDefault();showCtx(event,\''+c.id+'\')">'+
      '<div class="card-top"><span class="status-dot '+c.status+'"></span>'+
      '<span class="type-icon">'+ti+'</span>'+
      '<span class="card-title" title="'+esc(c.title||'')+'">'+esc(c.title||'')+'</span></div>'+
      '<div class="card-summary">'+esc(c.summary||'')+'</div>'+
      '<div class="card-meta">'+esc(c.type||'')+' · '+ts+'</div></div>';
  }).join('');
  document.getElementById('itemCount').textContent=items.length+' items';
}

// ===== Detail View =====
function showDetail(id){
  currentID=id;
  // Highlight selected
  document.querySelectorAll('.card-item').forEach(function(el){el.classList.remove('selected')});
  var sel=document.querySelector('.card-item[onclick*="'+id+'"]');
  if(sel)sel.classList.add('selected');
  api('/api/open?id='+id).then(renderDetail).catch(function(){});
}

function renderDetail(d){
  var s=d.status||'active',ci=Math.round((d.confidence||0)*100);
  var h='<div class="detail-header"><h2>'+esc(d.title||'')+'</h2>'+
    '<div class="detail-meta">'+
    '<span class="meta-item"><span class="status-dot '+s+'"></span><span class="badge badge-'+s+'">'+s+'</span></span>'+
    '<span class="meta-item">'+esc(d.type||'')+'</span>'+
    '<span class="meta-item">Conf <span class="conf-bar"><span class="conf-fill" style="width:'+ci+'%"></span></span>&nbsp;'+ci+'%</span>'+
    '<span class="meta-item" style="margin-left:auto"><span class="id-mono">'+esc(d.id||'')+'</span></span>'+
    '</div></div>';
  if(d.summary)h+=sec('Summary',d.summary);
  if(d.content)h+=sec('Content',d.content.replace(/\n/g,'<br>'));
  h+=srcSec(d)+tagsSec(d)+scopeSec(d)+relSec(d);
  document.getElementById('detailPanel').innerHTML=h;
}

function sec(title,content){
  return '<div class="section"><h3>'+esc(title)+'</h3><div class="section-content">'+content+'</div></div>';
}

function srcSec(d){
  if(!d.source||!d.source.description)return'';
  var s=d.source;
  return '<div class="section"><h3>Source</h3><div class="section-content"><strong>'+esc(s.kind||'')+'</strong><br>'+esc(s.description||'')+'</div></div>';
}

function tagsSec(d){
  if(!d.tags||!d.tags.length)return'';
  return '<div class="section"><h3>Tags</h3><div class="tags-row">'+
    d.tags.map(function(t){return'<span class="tag">'+esc(t)+'</span>'}).join('')+
    '</div></div>';
}

function scopeSec(d){
  if(!d.scope)return'';
  var s=d.scope,h='';
  if(s.project)h+='<strong>Project:</strong> '+esc(s.project)+'<br>';
  if(s.modules&&s.modules.length)h+='<strong>Modules:</strong> '+s.modules.map(esc).join(', ')+'<br>';
  if(s.paths&&s.paths.length)h+='<strong>Paths:</strong><br>'+s.paths.map(function(p){return'<span class="id-mono" style="display:inline-block;margin:1px 2px">'+esc(p)+'</span>'}).join(' ');
  if(!h)return'';
  return '<div class="section"><h3>Scope</h3><div class="section-content">'+h+'</div></div>';
}

function relSec(d){
  if(!d.relations)return'';
  var keys=Object.keys(d.relations).filter(function(k){return d.relations[k]&&d.relations[k].length});
  if(!keys.length)return'';
  return '<div class="section"><h3>Relations</h3><div class="section-content">'+
    keys.map(function(k){return'<strong>'+esc(k)+':</strong> '+d.relations[k].map(esc).join(', ')}).join('<br>')+
    '</div></div>';
}

// ===== Context Menu =====
function showCtx(e,id){
  currentID=id;e.preventDefault();
  var m=document.getElementById('ctxMenu');
  m.style.display='block';
  m.style.left=Math.min(e.clientX,window.innerWidth-165)+'px';
  m.style.top=e.clientY+'px';
}

function hideCtx(){document.getElementById('ctxMenu').style.display='none'}
function copyID(){
  if(currentID){navigator.clipboard.writeText(currentID);toast('Copied: '+currentID)}
  hideCtx();
}

function markStatus(s){
  if(!currentID)return;
  api('/api/update?id='+currentID+'&status='+s,{method:'POST'}).then(function(){
    toast('Updated to '+s);showDetail(currentID);loadRecent();
  }).catch(function(){toast('Error')});
  hideCtx();
}

// ===== Theme =====
function toggleTheme(){
  dark=!dark;
  document.body.classList.toggle('light',!dark);
  document.body.classList.toggle('dark',dark);
}

// ===== Project Management =====
function loadRecents(){
  api('/api/project').then(function(d){
    var s=document.getElementById('projSelect');
    s.innerHTML='<option value="">-- Recent --</option>';
    if(d.recents)d.recents.forEach(function(r){s.innerHTML+='<option value="'+r+'">'+shortPath(r)+'</option>'});
    var inp=document.getElementById('projInput');
    inp.value=d.root||'';
    updatePathTooltip(d.root||'');
  });
}

function onProjSelect(v){
  if(v){document.getElementById('projInput').value=v;updatePathTooltip(v);changeProjectDirect(v)}
}

function changeProjectDirect(p){
  showStatus('Switching...');
  api('/api/project/set?root='+encodeURIComponent(p)).then(function(d){
    loadRecents();loadRecent();showStatus('Ready');
  });
}

function changeProject(){
  var p=document.getElementById('projInput').value.trim();
  if(!p)return;
  showStatus('Changing project...');
  api('/api/project/set?root='+encodeURIComponent(p)).then(function(d){
    document.getElementById('projInput').value=d.root;
    updatePathTooltip(d.root);
    loadRecent();showStatus('Ready');
  }).catch(function(){showStatus('Error')});
}

// ===== Path Utilities =====
function shortPath(p){
  if(!p)return'';
  if(p.length<=40)return p;
  var parts=p.replace(/\\/g,'/').split('/');
  if(parts.length<=2)return p;
  return parts.slice(0,1).join('/')+'/…/'+parts.slice(-1);
}

function updatePathTooltip(p){
  var tt=document.getElementById('pathTooltip');
  if(p)tt.textContent=p;
}

// ===== Status & Toast =====
function showStatus(text,count){
  document.getElementById('statusText').innerHTML=text;
  if(count!==undefined)document.getElementById('itemCount').textContent=count;
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2000);
}

function esc(s){
  var d=document.createElement('div');
  d.textContent=s||'';
  return d.innerHTML;
}

// ===== Global Events =====
document.addEventListener('click',function(e){
  if(!e.target.closest('#ctxMenu'))hideCtx();
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')hideCtx();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchBox').focus()}
});

// ===== Init =====
loadRecents();
loadRecent();
</script>
</body>
</html>
