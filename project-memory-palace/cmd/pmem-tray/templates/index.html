<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Memory Palace</title>
<style>
:root{--bg:#f8f9fa;--s:#fff;--t:#1a1d23;--t2:#6b7280;--t3:#9ca3af;--a:#2563eb;--ah:#1d4ed8;--as:#eff6ff;--b:#e5e7eb;--bl:#f3f4f6;--h:#f3f4f6;--sel:#eff6ff;--tagbg:#f0fdf4;--tagt:#166534;--r:8px;--rs:6px;--f:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--fm:"SF Mono","Fira Code","Consolas",monospace;--s-a:#22c55e;--s-s:#eab308;--s-sp:#9ca3af;--s-r:#ef4444}
.dark{--bg:#0f1117;--s:#1a1d23;--t:#e5e7eb;--t2:#9ca3af;--t3:#6b7280;--a:#3b82f6;--ah:#60a5fa;--as:#1e293b;--b:#2d3139;--bl:#24272e;--h:#1e293b;--sel:#1e3a5f;--tagbg:#14532d;--tagt:#86efac}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--f);font-size:13px;background:var(--bg);color:var(--t);display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}
aside{width:280px;min-width:280px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100vh;z-index:10}
.header{padding:16px 16px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.header h1{font-size:14px;font-weight:700;letter-spacing:-.01em}
.header .logo{font-size:18px}
.toolbar{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--b)}
.toolbar button{padding:5px 8px;border:1px solid var(--b);border-radius:var(--rs);background:var(--s);color:var(--t);font-size:12px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px}
.toolbar button:hover{background:var(--h)}
.search-wrap{padding:8px 12px;position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--b);border-radius:var(--rs);background:var(--bg);color:var(--t);font-size:12px;outline:none;transition:border .15s,box-shadow .15s}
.search-wrap input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-wrap input::placeholder{color:var(--t3)}
.search-wrap .sicon{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.card-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 8px}
.card-list::-webkit-scrollbar{width:5px}
.card-list::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.card-item{padding:10px 12px;border-radius:var(--rs);cursor:pointer;margin:1px 0;transition:background .1s;border:1px solid transparent;display:flex;flex-direction:column;gap:3px}
.card-item:hover{background:var(--h)}
.card-item.sel{background:var(--sel);border-color:var(--a)}
.card-item .ctop{display:flex;align-items:center;gap:6px}
.card-item .cst{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-item .cst.active{background:var(--s-a)}.cst.stale{background:var(--s-s)}.cst.superseded{background:var(--s-sp)}.cst.rejected{background:var(--s-r)}
.card-item .ct{font-size:12px;flex-shrink:0;opacity:.6}
.card-item .ctl{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.card-item .cdsc{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item .cdt{font-size:10px;color:var(--t3)}
.empty-list{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);gap:10px;padding:24px}
.empty-list .ei{font-size:32px;opacity:.4}
.empty-list .et{font-size:12px;text-align:center;line-height:1.5}
main{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg)}
main::-webkit-scrollbar{width:6px}main::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px}
.detail-header{margin-bottom:24px}
.detail-header h2{font-size:22px;font-weight:700;line-height:1.35;letter-spacing:-.01em}
.dh-meta{display:flex;gap:14px;align-items:center;margin-top:8px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.dh-meta .mi{display:flex;align-items:center;gap:5px}
.cbar{width:60px;height:4px;background:var(--b);border-radius:2px;overflow:hidden}
.cfill{height:100%;background:var(--a);border-radius:2px;transition:width .3s}
.ds{margin-bottom:22px}
.ds h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.ds .cnt{font-size:13px;line-height:1.7;padding:14px 16px;background:var(--s);border-radius:var(--r);border:1px solid var(--b)}
.ds .empty{color:var(--t3);font-style:italic;font-size:12px;padding:4px 0}
.tags-row{display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:2px 10px;border-radius:100px;font-size:11px;font-weight:600;background:var(--tagbg);color:var(--tagt)}
.badge{padding:1px 8px;border-radius:100px;font-size:11px;font-weight:600}
.ba{background:#dcfce7;color:#166534}.dark .ba{background:#14532d;color:#86efac}
.bs{background:#fef9c3;color:#854d0e}.dark .bs{background:#713f12;color:#fde047}
.bsp{background:#f3f4f6;color:#6b7280}.dark .bsp{background:#374151;color:#9ca3af}
.br{background:#fee2e2;color:#991b1b}.dark .br{background:#7f1d1d;color:#fca5a5}
.ctx-menu{position:fixed;background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:1000;min-width:150px;display:none}
.ctx-menu .cmi{padding:6px 12px;font-size:12px;border-radius:4px;cursor:pointer;transition:background .1s}.cmi:hover{background:var(--h)}
.ctx-menu .sep{height:1px;background:var(--b);margin:4px 0;padding:0}
footer{border-top:1px solid var(--b);padding:5px 16px;font-size:10px;color:var(--t3);display:flex;justify-content:space-between}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--t);color:var(--bg);padding:8px 20px;border-radius:100px;font-size:12px;font-weight:500;z-index:2000;opacity:0;transition:opacity .2s;pointer-events:none}.toast.show{opacity:1}
@media(max-width:768px){body{flex-direction:column}aside{width:100%;min-width:auto;height:auto;max-height:45vh}main{padding:16px}.detail-header h2{font-size:18px}}

.proj-bar{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--b)}
.proj-input{flex:1;padding:5px 8px;border:1px solid var(--b);border-radius:4px;background:var(--bg);color:var(--t);font-size:11px;outline:none}
.proj-input:focus{border-color:var(--a)}
.proj-btn{padding:5px 10px;border:1px solid var(--b);border-radius:4px;background:var(--s);color:var(--t);font-size:11px;cursor:pointer;white-space:nowrap}
.proj-btn:hover{background:var(--h)}
</style>
</head>
<body class="dark">
<aside>
<div class="header"><span class="logo">&#x1f3f0;</span><h1>Project Memory Palace</h1></div>
<div class="toolbar">
<button onclick="toggleTheme()" title="Dark/Light">&#x1f31b;</button>
<button onclick="refreshList()">&#x21bb;</button>
</div>
<div class="proj-bar">
  <select id="projSelect" class="proj-select" onchange="onProjSelect(this.value)" style="flex:1;padding:5px 4px;border:1px solid var(--b);border-radius:4px;background:var(--bg);color:var(--t);font-size:11px;max-width:180px">
    <option value="">-- Recent Projects --</option>
  </select>
  <input type="text" id="projInput" class="proj-input" placeholder="Path..." style="max-width:120px">
  <button class="proj-btn" onclick="changeProject()">Go</button>
</div>
<div class="search-wrap">
<span class="sicon">&#x1f50d;</span>
<input type="text" id="searchBox" placeholder="Search memories..." onkeydown="if(event.key==='Enter')doSearch()">
</div>
<div class="card-list" id="cardList">
<div class="empty-list"><span class="ei">&#x1f4ed;</span><span class="et">No memories found</span></div>
</div>
<footer><span id="statusText">Ready</span><span id="itemCount"></span></footer>
</aside>
<main id="detailPanel">
<div class="empty-list" style="height:100%"><span class="ei">&#x1f4cb;</span><span class="et">Select a memory to view details</span></div>
</main>
<div class="ctx-menu" id="ctxMenu">
<div class="cmi" onclick="copyID()">Copy ID</div><div class="sep"></div>
<div class="cmi" onclick="markStatus('active')">Mark active</div>
<div class="cmi" onclick="markStatus('stale')">Mark stale</div>
<div class="cmi" onclick="markStatus('superseded')">Mark superseded</div>
</div>
<div class="toast" id="toast"></div>
<script>
var TYPE_ICONS={project_goal:"\u2606",design:"\u25c9",decision:"\u2691",change_reason:"\u21bb",bugfix:"\u2620",module:"\u25a3",convention:"\u00a7",open_question:"\u2047"};
var currentID=null,dark=true;

function loadRecent(){showStatus('<span class="spinner"></span> Loading...');
fetch('/api/recent').then(r=>r.json()).then(d=>{renderList(d.results||[]);showStatus('Ready',(d.results||[]).length+' items')}).catch(e=>showStatus('Error loading'))}
function doSearch(){var q=document.getElementById('searchBox').value.trim();if(!q)return;
showStatus('<span class="spinner"></span> Searching...');
fetch('/api/search?q='+encodeURIComponent(q)).then(r=>r.json()).then(d=>{renderList(d.results||[]);showStatus('Found '+(d.results||[]).length+' results')}).catch(e=>showStatus('Search error'))}
function renderList(items){var el=document.getElementById('cardList');
if(!items.length){el.innerHTML='<div class="empty-list"><span class="ei">&#x1f4ed;</span><span class="et">No memories found</span></div>';return}
el.innerHTML=items.map(function(c){var ti=TYPE_ICONS[c.type]||'\u25cf',ts=(c.updated_at||'').slice(0,16);
return'<div class="card-item" onclick="showDetail(\''+c.id+'\')" oncontextmenu="event.preventDefault();showCtx(event,\''+c.id+'\')"><div class="ctop"><span class="cst '+c.status+'"></span><span class="ct">'+ti+'</span><span class="ctl">'+esc(c.title||'')+'</span></div><div class="cdsc">'+esc(c.summary||'')+'</div><div class="cdt">'+esc(c.type||'')+' &middot; '+ts+'</div></div>'}).join('');
document.getElementById('itemCount').textContent=items.length+' items'}
function refreshList(){loadRecent()}
function showDetail(id){currentID=id;fetch('/api/open?id='+id).then(r=>r.json()).then(d=>renderDetail(d)).catch(e=>{})}
function renderDetail(d){var s=d.status||'active',ci=Math.round((d.confidence||0)*100);
var h='<div class="detail-header"><h2>'+esc(d.title||'')+'</h2><div class="dh-meta">'+
'<span class="mi"><span class="cst '+s+'"></span><span class="badge b'+s.charAt(0)+'">'+s+'</span></span>'+
'<span class="mi">'+esc(d.type||'')+'</span>'+
'<span class="mi">Conf <span class="cbar"><span class="cfill" style="width:'+ci+'%"></span></span> '+ci+'%</span>'+
'<span class="mi" style="margin-left:auto;font-family:var(--fm);font-size:11px">'+esc(d.id||'')+'</span></div></div>';
if(d.summary)h+=sec('Summary',d.summary);if(d.content)h+=sec('Content',d.content);
h+=srcSec(d)+tagsSec(d)+scopeSec(d)+relSec(d);
document.getElementById('detailPanel').innerHTML=h}
function sec(t,c){return'<div class="ds"><h3>'+esc(t)+'</h3><div class="cnt">'+esc(c).replace(/\n/g,'<br>')+'</div></div>'}
function srcSec(d){if(!d.source)return'';var s=d.source;return'<div class="ds"><h3>Source</h3><div class="cnt"><strong>'+esc(s.kind||'')+'</strong><br>'+esc(s.description||'')+'</div></div>'}
function tagsSec(d){if(!d.tags||!d.tags.length)return'';return'<div class="ds"><h3>Tags</h3><div class="tags-row">'+d.tags.map(function(t){return'<span class="tag">'+esc(t)+'</span>'}).join('')+'</div></div>'}
function scopeSec(d){if(!d.scope)return'';var s=d.scope,h='';if(s.project)h+='<strong>Project:</strong> '+esc(s.project)+'<br>';if(s.modules&&s.modules.length)h+='<strong>Modules:</strong> '+s.modules.map(esc).join(', ')+'<br>';if(s.paths&&s.paths.length)h+='<strong>Paths:</strong> '+s.paths.map(esc).join(', ');if(!h)return'';return'<div class="ds"><h3>Scope</h3><div class="cnt">'+h+'</div></div>'}
function relSec(d){if(!d.relations)return'';var keys=Object.keys(d.relations).filter(function(k){return d.relations[k]&&d.relations[k].length});if(!keys.length)return'';return'<div class="ds"><h3>Relations</h3><div class="cnt">'+keys.map(function(k){return'<strong>'+esc(k)+':</strong> '+d.relations[k].map(esc).join(', ')}).join('<br>')+'</div></div>'}
function showCtx(e,id){currentID=id;e.preventDefault();var m=document.getElementById('ctxMenu');m.style.display='block';m.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';m.style.top=e.clientY+'px'}
function hideCtx(){document.getElementById('ctxMenu').style.display='none'}
function copyID(){if(currentID){navigator.clipboard.writeText(currentID);toast('Copied: '+currentID)}hideCtx()}
function markStatus(s){if(!currentID)return;fetch('/api/update?id='+currentID+'&status='+s,{method:'POST'}).then(function(){toast('Updated to '+s);showDetail(currentID);loadRecent()}).catch(function(e){toast('Error')});hideCtx()}
function toggleTheme(){dark=!dark;document.body.classList.toggle('dark',dark)}
function showStatus(text,count){document.getElementById('statusText').innerHTML=text;if(count!==undefined)document.getElementById('itemCount').textContent=count}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
document.addEventListener('click',function(e){if(!e.target.closest('#ctxMenu'))hideCtx()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')hideCtx()});

function loadRecents(){fetch("/api/project").then(r=>r.json()).then(d=>{var s=document.getElementById("projSelect");s.innerHTML="<option value=\"\">-- Recent --</option>";if(d.recents){d.recents.forEach(function(r){s.innerHTML+="<option value=\""+r+"\">"+r+"</option>"})};document.getElementById("projInput").value=d.root||""})}
function onProjSelect(v){if(v){document.getElementById("projInput").value=v;changeProjectDirect(v)}}
function changeProjectDirect(p){showStatus("Switching...");fetch("/api/project/set?root="+encodeURIComponent(p)).then(r=>r.json()).then(d=>{loadRecents();loadRecent();showStatus("Ready")})}
function changeProject(){var p=document.getElementById("projInput").value.trim();if(!p)return;showStatus("Changing project...");fetch("/api/project/set?root="+encodeURIComponent(p)).then(r=>r.json()).then(d=>{document.getElementById("projInput").value=d.root;loadRecent();showStatus("Ready")}).catch(e=>showStatus("Error"))}
function loadProject(){fetch("/api/project").then(r=>r.json()).then(d=>{document.getElementById("projInput").value=d.root||""})}
loadRecents();

loadRecent();
</script>
</body>
</html>
