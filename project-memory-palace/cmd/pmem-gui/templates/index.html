<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Memory Palace</title>
<style>
:root{--bg:#f8f9fa;--surface:#ffffff;--text:#1a1d23;--text2:#6b7280;--text3:#9ca3af;--accent:#2563eb;--accent-hover:#1d4ed8;--accent-subtle:#eff6ff;--border:#e5e7eb;--border-light:#f3f4f6;--hover:#f3f4f6;--selected:#eff6ff;--tag-bg:#f0fdf4;--tag-text:#166534;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--radius:8px;--radius-sm:6px;--font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--font-mono:"SF Mono","Fira Code","Consolas",monospace;--status-active:#22c55e;--status-stale:#eab308;--status-superseded:#9ca3af;--status-rejected:#ef4444}
.dark{--bg:#0f1117;--surface:#1a1d23;--text:#e5e7eb;--text2:#9ca3af;--text3:#6b7280;--accent:#3b82f6;--accent-hover:#60a5fa;--accent-subtle:#1e293b;--border:#2d3139;--border-light:#24272e;--hover:#1e293b;--selected:#1e3a5f;--tag-bg:#14532d;--tag-text:#86efac;--shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-ui);font-size:13px;background:var(--bg);color:var(--text);display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}
aside{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;z-index:10}
.header{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.header h1{font-size:14px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.header h1 .logo{font-size:18px}
.header .sub{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar{display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid var(--border)}
.toolbar button{flex:0;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px}
.toolbar button:hover{background:var(--hover);border-color:var(--text3)}
.toolbar button.primary{background:var(--accent);color:#fff;border-color:var(--accent);flex:1}
.toolbar button.primary:hover{background:var(--accent-hover)}
.search-wrap{padding:8px 12px;position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:12px;outline:none;transition:border .15s,box-shadow .15s}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.card-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 8px}
.card-list::-webkit-scrollbar{width:5px}
.card-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.card-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin:1px 0;transition:background .1s;border:1px solid transparent}
.card-item:hover{background:var(--hover)}
.card-item.selected{background:var(--selected);border-color:var(--accent)}
.card-item .c-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.card-item .c-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-item .c-status.active{background:var(--status-active)}.card-item .c-status.stale{background:var(--status-stale)}.card-item .c-status.superseded{background:var(--status-superseded)}.card-item .c-status.rejected{background:var(--status-rejected)}
.card-item .c-type{font-size:12px;flex-shrink:0;opacity:.6}
.card-item .c-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.card-item .c-meta{display:flex;gap:8px;font-size:11px;color:var(--text3);padding-left:12px}
.card-item .c-summary{font-size:11px;color:var(--text2);padding-left:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty-list{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:8px;padding:24px}.empty-list .e-icon{font-size:32px;opacity:.4}.empty-list .e-text{font-size:12px;text-align:center;line-height:1.5}
main{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg)}
main::-webkit-scrollbar{width:6px}main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.detail-header{margin-bottom:28px}
.detail-header h2{font-size:22px;font-weight:700;line-height:1.35;letter-spacing:-.01em}
.detail-header .meta-bar{display:flex;gap:16px;align-items:center;margin-top:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.meta-bar .m-item{display:flex;align-items:center;gap:5px}
.meta-bar .confidence-bar{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.meta-bar .confidence-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.detail-section .content{font-size:13px;line-height:1.75;color:var(--text);padding:14px 16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.detail-section .content pre{font-family:var(--font-mono);font-size:12px;white-space:pre-wrap;word-break:break-word}
.detail-section .empty{color:var(--text3);font-style:italic;font-size:12px;padding:4px 0}
.tags-row{display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:2px 10px;border-radius:100px;font-size:11px;font-weight:600;background:var(--tag-bg);color:var(--tag-text)}
.badge{padding:1px 8px;border-radius:100px;font-size:11px;font-weight:600}
.badge-active{background:#dcfce7;color:#166534}.dark .badge-active{background:#14532d;color:#86efac}
.badge-stale{background:#fef9c3;color:#854d0e}.dark .badge-stale{background:#713f12;color:#fde047}
.badge-superseded{background:#f3f4f6;color:#6b7280}.dark .badge-superseded{background:#374151;color:#9ca3af}
.badge-rejected{background:#fee2e2;color:#991b1b}.dark .badge-rejected{background:#7f1d1d;color:#fca5a5}
.ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow);z-index:1000;min-width:150px;display:none}
.ctx-menu .mi{padding:6px 12px;font-size:12px;border-radius:4px;cursor:pointer;transition:background .1s}.ctx-menu .mi:hover{background:var(--hover)}
.ctx-menu .sep{height:1px;background:var(--border);margin:4px 0}
footer{border-top:1px solid var(--border);padding:5px 16px;font-size:10px;color:var(--text3);display:flex;justify-content:space-between}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 20px;border-radius:100px;font-size:12px;font-weight:500;z-index:2000;opacity:0;transition:opacity .2s;pointer-events:none}.toast.show{opacity:1}
@media(max-width:768px){body{flex-direction:column}aside{width:100%;min-width:auto;height:auto;max-height:45vh}main{padding:16px}.detail-header h2{font-size:18px}}
</style>
</head>
<body class="dark" id="body">

<aside>
  <div class="header">
    <h1><span class="logo">&#x1f3f0;</span>Project Memory Palace</h1>
    <div class="sub" id="projectRoot">v0.2.0</div>
  </div>
  <div class="toolbar">
    <button onclick="toggleTheme()" title="Dark/Light">&#x1f31b;</button>
    <button onclick="toggleLang()" id="langBtn">&#x4e2d;</button>
    <button class="primary" onclick="doSearch()">Search</button>
  </div>
  <div class="search-wrap">
    <span class="icon">&#x1f50d;</span>
    <input type="text" id="searchBox" placeholder="Search memories..." onkeydown="if(event.key===Enter){doSearch()}">
  </div>
  <div class="card-list" id="cardList">
    <div class="empty-list"><span class="e-icon">&#x1f4ed;</span><span class="e-text">No memories found</span></div>
  </div>
  <footer><span id="statusText">Ready</span><span id="itemCount"></span></footer>
</aside>

<main id="detailPanel">
  <div class="empty-list" style="height:100%"><span class="e-icon">&#x1f4cb;</span><span class="e-text">Select a memory to view details</span></div>
</main>

<div class="ctx-menu" id="ctxMenu">
  <div class="mi" onclick="copyID()">Copy ID</div>
  <div class="sep"></div>
  <div class="mi" onclick="markStatus('active')">Mark as active</div>
  <div class="mi" onclick="markStatus('stale')">Mark as stale</div>
  <div class="mi" onclick="markStatus('superseded')">Mark as superseded</div>
</div>
<div class="toast" id="toast"></div>

<script>
var TYPE_ICONS={project_goal:"\u2606",design:"\u25c9",decision:"\u2691",change_reason:"\u21bb",bugfix:"\u2620",module:"\u25a3",convention:"\u00a7",open_question:"\u2047"};
var currentID=null,currentData=null,dark=true;

function loadRecent(){
  showStatus('<span class="spinner"></span> Loading...');
  fetch('/api/recent').then(r=>r.json()).then(d=>{
    renderList(d.results||[]);
    showStatus('Ready',(d.results||[]).length+' items');
  }).catch(e=>showStatus('Error'));
}
function doSearch(){
  var q=document.getElementById('searchBox').value.trim();if(!q)return;
  showStatus('<span class="spinner"></span> Searching...');
  fetch('/api/search?q='+encodeURIComponent(q)).then(r=>r.json()).then(d=>{
    renderList(d.results||[]);
    showStatus('Found '+(d.results||[]).length+' results');
  });
}
function renderList(items){
  var el=document.getElementById('cardList');
  if(!items.length){el.innerHTML='<div class="empty-list"><span class="e-icon">&#x1f4ed;</span><span class="e-text">No memories found</span></div>';return}
  el.innerHTML=items.map(function(c){
    var ti=TYPE_ICONS[c.type]||'\u25cf';
    return '<div class="card-item" onclick="showDetail(\'+c.id+'\)" oncontextmenu="event.preventDefault();showCtx(event,\'+c.id+'\)"><div class="c-top"><span class="c-status '+c.status+'"></span><span class="c-type">'+ti+'</span><span class="c-title">'+esc(c.title||'')+'</span></div><div class="c-summary">'+esc(c.summary||'')+'</div><div class="c-meta"><span>'+esc((c.updated_at||'').slice(0,16))+'</span><span>'+esc(c.type||'')+'</span></div></div>';
  }).join('');
  document.getElementById('itemCount').textContent=items.length+' items';
}
function showDetail(id){
  currentID=id;
  fetch('/api/open?id='+id).then(r=>r.json()).then(d=>{currentData=d;renderDetail(d)});
}
function renderDetail(d){
  var s=d.status||'active',ci=Math.round((d.confidence||0)*100);
  var h='<div class="detail-header"><h2>'+esc(d.title||'')+'</h2><div class="meta-bar">'+
    '<span class="m-item"><span class="c-status '+s+'"></span><span class="badge badge-'+s+'">'+s+'</span></span>'+
    '<span class="m-item">'+esc(d.type||'')+'</span>'+
    '<span class="m-item">Confidence <span class="confidence-bar"><span class="confidence-fill" style="width:'+ci+'%"></span></span> '+ci+'%</span>'+
    '<span class="m-item" style="margin-left:auto">'+esc(d.id||'')+'</span></div></div>';
  if(d.summary)h+=sec('Summary',d.summary);
  if(d.content)h+=sec('Content',d.content);
  h+=srcSec(d)+tagsSec(d)+scopeSec(d)+relSec(d);
  document.getElementById('detailPanel').innerHTML=h;
}
function sec(title,content){
  return '<div class="detail-section"><h3>'+esc(title)+'</h3><div class="content">'+esc(content).replace(/\n/g,'<br>')+'</div></div>';
}
function srcSec(d){
  if(!d.source)return'';
  var s=d.source;
  return '<div class="detail-section"><h3>Source</h3><div class="content"><strong>'+esc(s.kind||'')+'</strong><br>'+esc(s.description||'')+'</div></div>';
}
function tagsSec(d){
  if(!d.tags||!d.tags.length)return'';
  return '<div class="detail-section"><h3>Tags</h3><div class="tags-row">'+d.tags.map(function(t){return'<span class="tag">'+esc(t)+'</span>'}).join('')+'</div></div>';
}
function scopeSec(d){
  if(!d.scope)return'';
  var s=d.scope,h='';
  if(s.project)h+='<strong>Project:</strong> '+esc(s.project)+'<br>';
  if(s.modules&&s.modules.length)h+='<strong>Modules:</strong> '+s.modules.map(esc).join(', ')+'<br>';
  if(s.paths&&s.paths.length)h+='<strong>Paths:</strong> '+s.paths.map(esc).join(', ');
  if(!h)return'';
  return '<div class="detail-section"><h3>Scope</h3><div class="content">'+h+'</div></div>';
}
function relSec(d){
  if(!d.relations)return'';
  var keys=Object.keys(d.relations).filter(function(k){return d.relations[k]&&d.relations[k].length});
  if(!keys.length)return'';
  return '<div class="detail-section"><h3>Relations</h3><div class="content">'+keys.map(function(k){return'<strong>'+esc(k)+':</strong> '+d.relations[k].map(esc).join(', ')}).join('<br>')+'</div></div>';
}
function showCtx(e,id){currentID=id;e.preventDefault();var m=document.getElementById('ctxMenu');m.style.display='block';m.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';m.style.top=e.clientY+'px'}
function hideCtx(){document.getElementById('ctxMenu').style.display='none'}
function copyID(){if(currentID){navigator.clipboard.writeText(currentID);toast('Copied: '+currentID)}hideCtx()}
function markStatus(s){
  if(!currentID)return;
  fetch('/api/update?id='+currentID+'&status='+s,{method:'POST'}).then(function(){
    toast('Updated to '+s);showDetail(currentID);loadRecent();
  }).catch(function(e){toast('Error: '+e)});
  hideCtx();
}
function toggleTheme(){dark=!dark;document.getElementById('body').classList.toggle('dark',dark)}
function toggleLang(){location.href=document.documentElement.lang==='en'?'/lang/zh':'/lang/en'}
function showStatus(text,count){document.getElementById('statusText').innerHTML=text;if(count!==undefined)document.getElementById('itemCount').textContent=count}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
document.addEventListener('click',function(e){if(!e.target.closest('#ctxMenu'))hideCtx()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')hideCtx()});
loadRecent();
</script>
</body>
</html>
